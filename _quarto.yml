project:
  type: book
  output-dir: "docs"

book:
  title: "Estatística Aplicada à Pesca e Aquicultura com R"
  author: "Evaldo Martins da Silva"
  date: "14/04/2025"
  cover-image: images/capa-livro-eapa.png
  chapters:
    - index.qmd
    - part: "Unidade I · Do mouse ao código"
      chapters:
        - capitulos/capitulo01/intro.qmd
        - capitulos/capitulo02/criacao_ambiente_computacional.qmd
        - capitulos/capitulo03/organizacao_projetos_leitura_dados.qmd
    - part: "Unidade II · Conhecer os dados"
      chapters:
        - capitulos/capitulo05/analise_exploratoria_statistica_descritiva.qmd
    - part: "Unidade III · Planejar a coleta"
      chapters:
        - capitulos/capitulo06/planejamento_amostral_delineamentos_experimentos.qmd
        - capitulos/capitulo06/planejamento_experimental_delineamentos.qmd
    - part: "Unidade IV · Comparar grupos — inferência"
      chapters:
        - capitulos/capitulo07/testes_parametricos_uma_duas_amostras.qmd
        - capitulos/capitulo08/nao-parametricos_uma_duas_amostras.qmd
        - capitulos/capitulo11/anova_estudos_observacionais_experimentais.qmd
    - part: "Unidade V · Relações entre variáveis"
      chapters:
        - capitulos/capitulo10/analise_correlacao_associacao_variaveis.qmd
        - capitulos/capitulo09/regressao_linear_simples_multipla.qmd
        - capitulos/capitulo13/analise_regressao_nao_linear.qmd
        - capitulos/capitulo17/analise_multivariada_dados.qmd
    - part: "Unidade VI · Visualização e comunicação de dados"
      chapters:
        - capitulos/capitulo22/criacao_graficos_visualizacao.qmd
        - capitulos/capitulo18/criacao_mapas_em_R.qmd
        - capitulos/capitulo21/relatorios_comunicacao_dados_usando_quarto.qmd
    - summary.qmd
    - references.qmd

bibliography: references.bib
csl: abnt.csl

format:
  html:
    theme: [yeti, custom.scss]
    lang: pt-BR
  pdf:
    documentclass: scrreprt
    lang: pt-BR
  typst:
    keep-typ: true
    include-in-header:
      - cover.typ
      - estilo-typst.typ
    papersize: a4
    margin:
      x: 2.5cm
      y: 2.5cm
    lang: pt-BR
    toc: true

editor: visual
