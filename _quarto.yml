project:
  type: book
  output-dir: "docs"

book:
  title: "Estatística Aplicada à Pesca e Aquicultura com R"
  author: "Evaldo Martins da Silva"
  date: "14/04/2025"
  cover-image: images/capa-livro-eapa.png
  chapters:
    - index.qmd
    - part: "Unidade I · Do mouse ao código"
      chapters:
        - capitulos/capitulo01/intro.qmd
        - capitulos/capitulo02/criacao_ambiente_computacional.qmd
        - capitulos/capitulo03/organizacao_projetos_leitura_dados.qmd
    # Unidade II · "Antes da análise": tudo o que precede o primeiro teste —
    # planejar a coleta e, com os dados em mãos, conhecê-los na exploração
    # inicial, já preparando as análises que virão.
    - part: "Unidade II · Antes da análise — planejar a pesquisa e conhecer os dados"
      chapters:
        - capitulos/capitulo06/planejando_sua_pesquisa.qmd
        - capitulos/capitulo05/preparando_os_dados.qmd
        - capitulos/capitulo04/analise_exploratoria_statistica_descritiva.qmd
    - part: "Unidade III · Comparar grupos — inferência"
      chapters:
        - capitulos/capitulo07/testes_parametricos_uma_duas_amostras.qmd
        - capitulos/capitulo08/nao-parametricos_uma_duas_amostras.qmd
        - capitulos/capitulo09/anova_estudos_observacionais_experimentais.qmd
    - part: "Unidade IV · Relações entre variáveis"
      chapters:
        - capitulos/capitulo10/analise_correlacao_associacao_variaveis.qmd
        - capitulos/capitulo11/regressao_linear_simples_multipla.qmd
        - capitulos/capitulo12/analise_regressao_nao_linear.qmd
        - capitulos/capitulo13/analise_multivariada_dados.qmd
    - part: "Unidade V · Visualização e comunicação de dados"
      chapters:
        - capitulos/capitulo14/criacao_graficos_visualizacao.qmd
        - capitulos/capitulo15/criacao_mapas_em_R.qmd
        - capitulos/capitulo16/relatorios_comunicacao_dados_usando_quarto.qmd
    - summary.qmd

bibliography: references.bib
csl: apa.csl
reference-section-title: "Referências Bibliográficas"

format:
  html:
    theme: [yeti, custom.scss]
    lang: pt-BR
  pdf:
    documentclass: scrreprt
    lang: pt-BR
  typst:
    keep-typ: true
    include-in-header:
      - cover.typ
      - estilo-typst.typ
    papersize: a4
    margin:
      x: 2.5cm
      y: 2.5cm
    lang: pt-BR
    toc: true

editor: visual
